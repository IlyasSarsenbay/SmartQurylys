<!-- Административная панель с боковым меню и основной областью контента -->
<div class="dashboard-layout">
  
  <!-- Боковое меню навигации -->
  <div class="sidebar">
    <!-- Пункты меню с использованием routerLinkActive для подсветки активного раздела -->
    <div class="sidebar-item" routerLink="/admin/users" routerLinkActive="active">
      <i class="fas fa-users-cog"></i>
      <span>Пользователи</span>
    </div>
    <div class="sidebar-item" routerLink="/admin/organisations" routerLinkActive="active">
      <i class="fas fa-building"></i>
      <span>Организации</span>
    </div>
    <div class="sidebar-item" routerLink="/admin/projects" routerLinkActive="active">
      <i class="fas fa-project-diagram"></i>
      <span>Проекты</span>
    </div>
    <!-- Место для добавления новых разделов -->
  </div>

  <!-- Область отображения контента выбранного раздела -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
