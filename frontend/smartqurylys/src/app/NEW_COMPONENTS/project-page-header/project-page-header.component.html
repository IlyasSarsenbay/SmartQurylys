<main>
    <section class="top-bar">
        <div class="section-1">
            <button class="projects-btn" routerLink="/projects">
                Проекты
            </button>
            <span class="divider"> / </span>
            <span class="project-title1"> {{ project.name }} </span>
            <span class="fv-btn-wrapper">
                <button class="favorite-btn" (click)="toggleFavorite(project)">
                    <img [src]="project.favorite ? 'assets/star_active.png' : 'assets/star.png'">
                </button>
            </span>
        </div>

        <div class="section-2">
            <div class="top-bar-menu" (click)="onProjectMenuClick($event)">
                <button
                    type="button"
                    class="menu-trigger"
                    aria-label="Действия проекта"
                    aria-haspopup="menu"
                    [attr.aria-expanded]="isProjectMenuOpen"
                    (click)="toggleProjectMenu($event)">
                    ...
                </button>

                @if (isProjectMenuOpen) {
                    <div class="project-menu-dropdown" role="menu">
                        @if (canDeleteProject) {
                            <button
                                type="button"
                                class="project-menu-item project-menu-item-delete"
                                role="menuitem"
                                (click)="deleteProject()">
                                Удалить проект
                            </button>
                        }
                    </div>
                }
            </div>

            <!-- <button class="access-btn" (click)="openDialog()">
                <img src="assets/lock.png">
                <span>Управление доступом</span>
            </button> -->
        </div>
    </section>


    <header>
        <section class="header-top">
            <div class="text-input">
                <div
                    class="project-title-2"
                    [class.project-title-2-readonly]="!canEditProjectTitle"
                    [attr.contenteditable]="canEditProjectTitle ? 'true' : null"
                    spellcheck="false"
                    (blur)="onTitleBlur($event)">
                    {{ project.name }}
                </div>
            </div>
        </section>

        @if (statusBannerText) {
            <section class="header-status-row">
                <div [class]="statusBannerClass">
                    {{ statusBannerText }}
                </div>
            </section>
        }

        <section class="header-bot">
            <div class="tabs">
                <a class="tab" [routerLink]="['/projects', project.id]" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }">О проекте</a>
                <a class="tab" [routerLink]="['/projects', project.id, 'tasks']" routerLinkActive="active">График
                    работ</a>
                <a class="tab" [routerLink]="['/projects', project.id, 'documents']"
                    routerLinkActive="active">Документы</a>
                <a class="tab" [routerLink]="['/projects', project.id, 'participants']"
                    routerLinkActive="active">Участники</a>
            </div>
        </section>

    </header>
</main>
