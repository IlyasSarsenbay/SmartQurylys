<main>
    <div class="white-background">
    </div>

    <section class="sidebar">

        <div class="logo-box">
            <img id="logo" src="assets/SQ_Logo_Transparent.png">
            <span class="title">SmartQurylys</span>
        </div>

        <menu class="top-menu">
            <button (click)="togglePanel('projects')" [class.active]="activePanel==='projects'">
                <img class="icon" src="assets/icon_projects.png">
                <span>Projects</span>
            </button>

            <button routerLink="/contractor-registry" (click)="togglePanel('contractors')"
                [class.active]="activePanel==='contractors'">
                <img class="icon" src="assets/Icon_Contractors.png">
                <span>Contractors</span>
            </button>

            <button routerLink="/chat" (click)="togglePanel('chats')" [class.active]="activePanel==='chats'">
                <img class="icon" src="assets/Icon_Chat.png">
                <span>Chat</span>
            </button>

            <button routerLink="/constructor" (click)="togglePanel('constructor')" [class.active]="activePanel==='constructor'">
                <img class="icon" src="assets/edit-text.png">
                <span>Constructor</span>
            </button>
        </menu>

        <menu class="bot-menu">
            <button (click)="openNotificationsDialog()">
                <img class="icon" src="assets/icon_notification.png">
                <span>Notifications</span>
            </button>

            <button>
                <img class="icon" src="assets/icon_settings.png">
                <span>Settings</span>
            </button>

            <button routerLink="/personal-cabinet" (click)="togglePanel(activePanel)">
                <img class="icon-profile" src="assets/icon_profile-picture.png">
                <span>Account</span>
            </button>
        </menu>
    </section>

    <div class="overlay" [class.visible]="isPanelOpen()" (click)="closePanel()"></div>
    <div class="shadow" [class.visible]="!isPanelOpen()"></div>

    <section class="slide-panel" [class.open]="isPanelOpen()">
        <ng-container [ngSwitch]="activePanel">
            <div *ngSwitchCase="'tasks'">
                <h3>Tasks</h3>
            </div>
            <div *ngSwitchCase="'projects'">
                <app-projects-panel (closePanelCommand)="closePanel()"></app-projects-panel>
            </div>
        </ng-container>
    </section>

    @if (isNotificationsDialogOpen) {
    <app-notifications-dialog (closeDialog)="closeNotificationsDialog()"></app-notifications-dialog>
    }

</main>
